<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お支払い情報申請フォーム</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between text-gray-800">

    <!-- 【追加】画面操作防止用の全画面ローディングオーバーレイ -->
  <div id="loading-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-70 flex flex-col items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-8 text-center flex flex-col items-center">
      <div class="animate-spin inline-block w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full mb-6"></div>
      <p class="text-gray-800 font-bold text-lg leading-relaxed">
        画面を閉じないで<br>そのままお待ちください
      </p>
    </div>
  </div>

    <!-- 【追加】カスタムモーダル（ドメイン名が表示されないアラート） -->
  <div id="custom-alert" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-lg shadow-lg max-w-sm w-full p-6 text-center">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-indigo-100 text-indigo-600 mb-4">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <p id="alert-text" class="text-gray-700 font-medium mb-6 leading-relaxed whitespace-pre-line"></p>
      <button onclick="closeAlert()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded transition-colors duration-200">
        確認
      </button>
    </div>
  </div>


  <div class="max-w-md w-full mx-auto px-4 py-8">
    
    <!-- 全体初期ローディング表示 -->
    <div id="init-loading" class="bg-white p-6 rounded-lg shadow-md text-center">
      <div class="animate-spin inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
      <p class="text-lg font-medium">本人確認状況をチェックしています...</p>
    </div>

    <!-- ステップA: 本人確認案内画面 -->
    <div id="step-auth-intro" class="hidden bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-bold mb-4 text-center text-indigo-700">本人確認</h2>
      <p class="text-gray-600 mb-6 leading-relaxed text-sm">本人確認を行います。この認証は一度だけ行われます。</p>
      <button onclick="goStepEmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors duration-200">
        次へ
      </button>
    </div>

    <!-- ステップB: メールアドレス入力画面 -->
    <div id="step-auth-email" class="hidden bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-bold mb-4 text-center text-indigo-700">メールアドレス確認</h2>
      <p class="text-gray-600 mb-4 text-sm leading-relaxed">宇宙大楽の本申し込みの際に登録したメールアドレスを入力してください。</p>
      
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2" for="auth-email">メールアドレス <span class="text-red-500">*</span></label>
        <input type="email" id="auth-email" placeholder="example@example.com" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
        <p id="email-error-msg" class="text-red-500 text-sm mt-1 hidden"></p>
      </div>

      <button onclick="submitEmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors duration-200">
        次へ
      </button>
    </div>

    <!-- ステップC: ワンタイムパスコード入力画面 -->
    <div id="step-auth-code" class="hidden bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-bold mb-4 text-center text-indigo-700">ワンタイムコード認証</h2>
      <p class="text-gray-600 mb-4 text-sm leading-relaxed">
        先ほど入力したメールアドレス宛にワンタイムパスコードを記載したメールを送信しました。<br>メールを開いて以下の記入欄に<span class="font-bold text-indigo-600">6桁</span>のパスコードを入力して、認証するを押してください。
      </p>

      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2" for="auth-code">パスコード <span class="text-red-500">*</span></label>
        <input type="text" id="auth-code" maxlength="6" placeholder="123456" class="w-full p-2 text-center text-2xl tracking-widest border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
        <p id="code-error-msg" class="text-red-500 text-sm mt-1 hidden"></p>
      </div>

      <button onclick="submitCode()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors duration-200 mb-4">
        認証する
      </button>

      <div class="text-center">
        <a href="#" onclick="resendCode(event)" class="text-sm text-indigo-600 hover:underline">もう一度パスコードを送信する</a>
      </div>
    </div>

    <!-- ステップD: お支払い先申請フォーム画面 -->
    <div id="form-container" class="hidden bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-2xl font-bold mb-6 text-center text-indigo-700">お支払い先申請フォーム</h2>
      
      <form id="liff-form" onsubmit="submitForm(event)">
        <!-- 1. 申請者氏名（プルダウンを廃止し、自動表示テキストに変更） -->
        <div class="mb-4 bg-gray-100 p-3 rounded">
          <label class="block text-xs font-semibold text-gray-500 mb-1">申請者氏名（認証済み）</label>
          <div id="applicant-name-display" class="text-lg font-bold text-gray-800">読み込み中...</div>
          <input type="hidden" id="applicant-name" value="">
        </div>

        <!-- 2. 支払い先のお名前 -->
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2" for="payee-name">お支払い先のお名前 <span class="text-red-500">*</span></label>
          <select id="payee-name" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
            <option value="">-- 選択してください --</option>
            <option value="山田太郎">山田太郎</option>
            <option value="佐藤花子">佐藤花子</option>
            <option value="鈴木一郎">鈴木一郎</option>
            <!-- 他のメンバーを適宜追加してください -->
          </select>
        </div>

        <!-- 3. お支払い方法 -->
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-2" for="payment-method">お支払い方法 <span class="text-red-500">*</span></label>
          <select id="payment-method" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
            <option value="">-- 選択してください --</option>
            <option value="PayPay ID">PayPay ID</option>
            <option value="銀行口座">銀行口座振り込み</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors duration-200">
          送信する
        </button>
      </form>
    </div>

    <!-- 送信中・結果表示画面 -->
    <div id="status-container" class="hidden bg-white p-6 rounded-lg shadow-md text-center">
      <div id="spinner" class="animate-spin inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
      <p id="status-message" class="text-lg font-medium mb-8">送信中です。しばらくお待ちください...</p>
      <button id="close-btn" onclick="closeLiff()" class="hidden mx-auto bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-8 rounded transition-colors duration-200">
        閉じる
      </button>
    </div>
  </div>

  <script>
    // ※【重要設定】デプロイしたGASのWeb AppのURL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUzCkZUs_OLH0uRlNvGVPiWHzStj7PA8A-manHVDrzhX7QFLl5pf4dBWBd_Z4aHlqj/exec";
    // ※【重要設定】LINE Developerで作成したLIFF ID
    const LIFF_ID = "2010733574-ZUB1nVjS";

    let lineUserId = "";
    let confirmedEmail = "";

    // LIFFの初期化
    window.addEventListener('load', () => {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(profile => {
                lineUserId = profile.userId;
                checkUserVerification(); // LINE ID が取得できたら即時チェック開始
              })
              .catch(err => console.error("プロファイル取得失敗:", err));
          }
        })
        .catch(err => console.error("LIFF初期化失敗:", err));
    });

        // 【追加】カスタムアラートを表示する制御用の関数
    function showAlert(message) {
      document.getElementById('alert-text').innerText = message;
      document.getElementById('custom-alert').classList.remove('hidden');
    }

    // 【追加】カスタムアラートを閉じる用の関数
    function closeAlert() {
      document.getElementById('custom-alert').classList.add('hidden');
    }

        // ローディング表示/非表示をコントロールするヘルパー関数
    function showLoading() {
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // 本人確認状態のチェック
    function checkUserVerification() {
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'checkVerification',
          userId: lineUserId
        })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('init-loading').classList.add('hidden');
        if (data.status === 'verified') {
          // すでに本人確認済みの場合、アンケート画面へ直接遷移して氏名を挿入
          showFormScreen(data.fullName);
        } else {
          // 本人確認がまだの場合、認証案内画面（ステップA）を表示
          document.getElementById('step-auth-intro').classList.remove('hidden');
        }
      })
      .catch(err => {
        console.error("確認エラー:", err);
        alert("初期チェック中に通信エラーが発生しました。通信環境をご確認ください。");
      });
    }

    // A -> B 画面遷移
    function goStepEmail() {
      document.getElementById('step-auth-intro').classList.add('hidden');
      document.getElementById('step-auth-email').classList.remove('hidden');
    }

    // B: メールアドレス送信処理
    function submitEmail() {
      const email = document.getElementById('auth-email').value.trim();
      const errorMsg = document.getElementById('email-error-msg');
      errorMsg.classList.add('hidden');

      if (!email) {
        showAlert("メールアドレスをご記入ください。");
        return;
      }

      // ローディング状態表示（画面操作を防止するオーバーレイ表示と念のための不透明化）
      showLoading(); // 全画面ローディングを表示
      document.getElementById('step-auth-email').classList.add('pointer-events-none', 'opacity-50');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'sendOtp',
          email: email,
          userId: lineUserId
        })
      })
      .then(res => res.json())
      .then(data => {
        // ローディング解除
        hideLoading(); // 完了したためローディングを消す
        document.getElementById('step-auth-email').classList.remove('pointer-events-none', 'opacity-50');
        if (data.status === 'otp_sent') {
          confirmedEmail = email; // 再送時のためにメールアドレスを保持
          // B -> C 画面遷移
          document.getElementById('step-auth-email').classList.add('hidden');
          document.getElementById('step-auth-code').classList.remove('hidden');
        } else if (data.status === 'email_not_matched') {
          errorMsg.innerText = "登録されたメールアドレスと違います。";
          errorMsg.classList.remove('hidden');
        } else {
          alert("エラー: " + data.message);
        }
      })
      .catch(err => {
        // ローディング解除
        hideLoading(); // エラー時もローディングを確実に消す
        document.getElementById('step-auth-email').classList.remove('pointer-events-none', 'opacity-50');
        alert("送信エラーが発生しました。時間を置いて再度お試しください。");
      });
    }

    // C: パスコード照合処理
    function submitCode() {
      const code = document.getElementById('auth-code').value.trim();
      const errorMsg = document.getElementById('code-error-msg');
      errorMsg.classList.add('hidden');

      if (!code) {
        showAlert("パスコードを入力してください。");
        return;
      }

      // ローディング状態表示（画面操作を防止するオーバーレイ表示と念のための不透明化）
      showLoading(); // 全画面ローディングを表示
      document.getElementById('step-auth-code').classList.add('pointer-events-none', 'opacity-50');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'verifyOtp',
          email: confirmedEmail,
          userId: lineUserId,
          otp: code
        })
      })
      .then(res => res.json())
      .then(data => {
        // ローディング解除
        hideLoading(); // 完了したためローディングを消す
        document.getElementById('step-auth-code').classList.remove('pointer-events-none', 'opacity-50');
        if (data.status === 'verified') {
          // 認証成功 -> アンケート画面へ
          document.getElementById('step-auth-code').classList.add('hidden');
          showFormScreen(data.fullName);
        } else {
          errorMsg.innerText = "パスコードが正しくありません、または有効期限(5分)が切れています。";
          errorMsg.classList.remove('hidden');
        }
      })
      .catch(err => {
        // ローディング解除
        hideLoading(); // エラー時もローディングを確実に消す
        document.getElementById('step-auth-code').classList.remove('pointer-events-none', 'opacity-50');
        alert("検証中に通信エラーが発生しました。");
      });
    }

    // C: ワンタイムパスコードの再送信処理
    function resendCode(event) {
      event.preventDefault();
      document.getElementById('step-auth-code').classList.add('pointer-events-none', 'opacity-50');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'sendOtp',
          email: confirmedEmail,
          userId: lineUserId
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('step-auth-code').classList.remove('pointer-events-none', 'opacity-50');
        if (data.status === 'otp_sent') {
          showAlert("新しいパスコードをメールで再送信しました。ご確認ください。");
          document.getElementById('auth-code').value = "";
          document.getElementById('code-error-msg').classList.add('hidden');
        } else {
          showAlert("再送信に失敗しました: " + data.message);
        }
      })
      .catch(err => {
        document.getElementById('step-auth-code').classList.remove('pointer-events-none', 'opacity-50');
        alert("再送信エラーが発生しました。");
      });
    }

    // フォーム画面の表示切り替えと氏名差し込み
    function showFormScreen(fullName) {
      document.getElementById('applicant-name-display').innerText = fullName;
      document.getElementById('applicant-name').value = fullName;
      document.getElementById('form-container').classList.remove('hidden');
    }

    // フォーム送信
    function submitForm(event) {
      event.preventDefault();

      const applicantName = document.getElementById('applicant-name').value;
      const payeeName = document.getElementById('payee-name').value;
      const paymentMethod = document.getElementById('payment-method').value;

      if (!applicantName || !payeeName || !paymentMethod) {
        alert("未入力の項目があります。すべての項目を入力してください。");
        return;
      }

      if (!lineUserId) {
        alert("LINEのユーザー情報が取得できていません。アプリを再起動してください。");
        return;
      }

      // 送信中画面への遷移
      document.getElementById('form-container').classList.add('hidden');
      document.getElementById('status-container').classList.remove('hidden');

      // GASへのPOSTリクエスト (申請登録)
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'submitApplication',
          userId: lineUserId,
          applicantName: applicantName,
          payeeName: payeeName,
          paymentMethod: paymentMethod
        })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('close-btn').classList.remove('hidden');

        if (data.status === 'success') {
          // 完了画面に切り替え
          document.getElementById('status-message').innerHTML = "申請が完了しました。<br>しばらくお待ちください。";
          document.getElementById('status-message').classList.add('text-green-600');
        } else {
          // 登録口座・PayPayがない場合
          document.getElementById('status-message').innerHTML = `ご指定した${paymentMethod}の<br>ご登録がありません。`;
          document.getElementById('status-message').classList.add('text-red-600');
        }
      })
      .catch(error => {
        console.error("通信エラー:", error);
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('close-btn').classList.remove('hidden');
        document.getElementById('status-message').innerText = "エラーが発生しました。通信環境を確認し再度お試しください。";
        document.getElementById('status-message').classList.add('text-red-600');
      });
    }

    // LIFF画面を閉じる
    function closeLiff() {
      liff.closeWindow();
    }
  </script>
</body>
</html>
