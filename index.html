<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送金先情報申請フォーム</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between text-gray-800">

  <!-- GitHub.ioなどのドメイン表示が出ないカスタムアラートモーダル -->
  <div id="custom-alert" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center border border-gray-100">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 text-red-600 mb-4">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-2">確認してください</h3>
      <p id="custom-alert-message" class="text-sm text-gray-600 mb-6 leading-relaxed whitespace-pre-line"></p>
      <button onclick="closeCustomAlert()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition-colors duration-200 shadow-md">
        確認
      </button>
    </div>
  </div>

  <div class="max-w-md w-full mx-auto px-4 py-8">
    
    <!-- 全体初期ローディング表示 -->
    <div id="init-loading" class="bg-white p-6 rounded-lg shadow-md text-center">
      <div class="animate-spin inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
      <p class="text-lg font-medium">申請フォームを読み込んでいます...</p>
    </div>

    <!-- お支払い先申請フォーム画面 -->
    <div id="form-container" class="hidden bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-2xl font-bold mb-6 text-center text-indigo-700">送金先申請フォーム</h2>
      
      <form id="liff-form" onsubmit="submitForm(event)">
        <!-- 1. 申請者氏名（パラメータから取得し自動表示） -->
        <div class="mb-4 bg-gray-100 p-3 rounded">
          <label class="block text-xs font-semibold text-gray-500 mb-1">申請者氏名（認証済み）</label>
          <div id="applicant-name-display" class="text-lg font-bold text-gray-800">読み込み中...</div>
          <input type="hidden" id="applicant-name" value="">
        </div>

        <!-- 2. 支払い先のお名前（動的読み込みに対応） -->
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2" for="payee-name">送金先のお名前 <span class="text-red-500">*</span></label>
          <select id="payee-name" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
            <option value="">-- 名前のデータを読み込み中... --</option>
          </select>
        </div>

        <!-- 3. お支払い方法 -->
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-2" for="payment-method">送金方法 <span class="text-red-500">*</span></label>
          <select id="payment-method" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" required>
            <option value="">-- 選択してください --</option>
            <option value="PayPay ID">PayPay ID</option>
            <option value="銀行口座">銀行口座振り込み</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors duration-200">
          送信する
        </button>
      </form>
    </div>

    <!-- 送信中・結果表示画面 -->
    <div id="status-container" class="hidden bg-white p-6 rounded-lg shadow-md text-center">
      <div id="spinner" class="animate-spin inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
      <p id="status-message" class="text-lg font-medium mb-8">送信中です。しばらくお待ちください...</p>
      <button id="close-btn" onclick="closeLiff()" class="hidden mx-auto bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-8 rounded transition-colors duration-200">
        閉じる
      </button>
    </div>
  </div>

  <script>
    // ※【重要】既存の「申請者一覧」に紐づくGASのWeb App URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxu8NiuC-nR9fFyLvj6CKK-dwBgJsR6gQiKyFqI1V8i0WvO1NkphZZlGGSbch-JxDJc_Q/exec";
    
    // ※【重要設定】LINE Developerで作成した支払い先申請フォームのLIFF ID
    const LIFF_ID = "2010800672-a1IiVaCw";

    let lineUserId = "";
    let applicantName = "";

    // カスタムアラートを表示する関数
    function showCustomAlert(message) {
      document.getElementById('custom-alert-message').innerText = message;
      document.getElementById('custom-alert').classList.remove('hidden');
    }

    // カスタムアラートを閉じる関数
    function closeCustomAlert() {
      document.getElementById('custom-alert').classList.add('hidden');
    }

    // LIFFの初期化とパラメータ取得
    window.addEventListener('load', () => {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(profile => {
                lineUserId = profile.userId;
                parseQueryParamAndShow(); // URLパラメータをパースしてフォームを表示
              })
              .catch(err => console.error("プロファイル取得失敗:", err));
          }
        })
        .catch(err => console.error("LIFF初期化失敗:", err));
    });

    // 遷移パラメータの読み込みと表示
    function parseQueryParamAndShow() {
      const urlParams = new URLSearchParams(window.location.search);
      const nameParam = urlParams.get('name');

      if (nameParam) {
        applicantName = decodeURIComponent(nameParam);
        document.getElementById('applicant-name-display').innerText = applicantName;
        document.getElementById('applicant-name').value = applicantName;
        
        // 本申し込みスプレッドシートからプルダウン用お名前リストを取得
        fetchPayeeNames();
      } else {
        showCustomAlert("認証データが確認できませんでした。最初の本人確認画面からお手続きをやり重してください。");
      }
    }

    // バックエンドのGASから「送金先のお名前」候補一覧を動的取得
    function fetchPayeeNames() {
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'getPayeeNames'
        })
      })
      .then(response => response.json())
      .then(data => {
        const selectElement = document.getElementById('payee-name');
        selectElement.innerHTML = '<option value="">-- 選択してください --</option>';

        if (data.status === 'success' && Array.isArray(data.names)) {
          // 重複を除去してお名前を選択肢に追加
          const uniqueNames = [...new Set(data.names)];
          uniqueNames.forEach(name => {
            if (name && name.toString().trim() !== "") {
              const option = document.createElement('option');
              option.value = name.trim();
              option.textContent = name.trim();
              selectElement.appendChild(option);
            }
          });

          // ロード完了時に初期表示ローディングを消してフォームを表示
          document.getElementById('init-loading').classList.add('hidden');
          document.getElementById('form-container').classList.remove('hidden');
        } else {
          showCustomAlert("送金先名簿データの読み込みに失敗しました。");
        }
      })
      .catch(error => {
        console.error("名簿取得エラー:", error);
        showCustomAlert("サーバーとの通信に失敗しました。時間をおいて再読込してください。");
      });
    }

    // フォーム送信
    function submitForm(event) {
      event.preventDefault();

      const applicantNameVal = document.getElementById('applicant-name').value;
      const payeeName = document.getElementById('payee-name').value;
      const paymentMethod = document.getElementById('payment-method').value;

      if (!applicantNameVal || !payeeName || !paymentMethod) {
        showCustomAlert("未入力の項目があります。すべての項目を入力してください。");
        return;
      }

      if (!lineUserId) {
        showCustomAlert("LINEのユーザー情報が取得できていません。アプリを再起動してください。");
        return;
      }

      document.getElementById('form-container').classList.add('hidden');
      document.getElementById('status-container').classList.remove('hidden');

      // GAS（お支払い情報管理側）へ登録をPOST
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'submitApplication',
          userId: lineUserId,
          applicantName: applicantNameVal,
          payeeName: payeeName,
          paymentMethod: paymentMethod
        })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('close-btn').classList.remove('hidden');

        if (data.status === 'success') {
          document.getElementById('status-message').innerHTML = "申請が完了しました。<br>しばらくお待ちください。";
          document.getElementById('status-message').classList.add('text-green-600');
        } else {
          document.getElementById('status-message').innerHTML = `ご指定した${paymentMethod}の<br>ご登録がありません。`;
          document.getElementById('status-message').classList.add('text-red-600');
        }
      })
      .catch(error => {
        console.error("通信エラー:", error);
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('close-btn').classList.remove('hidden');
        document.getElementById('status-message').innerText = "エラーが発生しました。通信環境を確認し再度お試しください。";
        document.getElementById('status-message').classList.add('text-red-600');
      });
    }

    function closeLiff() {
      liff.closeWindow();
    }
  </script>
</body>
</html>
